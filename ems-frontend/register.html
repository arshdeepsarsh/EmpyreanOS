<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EmpyreanHR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .register-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%; 
            max-width: 450px; 
        }
        .register-header { text-align: center; margin-bottom: 25px; }
        .register-header h3 { font-weight: 700; color: #333; }
        .btn-register { background: #0083b0; border: none; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-register:hover { background: #005f80; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <i class="fa-solid fa-user-plus fa-3x text-info mb-3"></i>
            <h3>Create Account</h3>
            <p class="text-muted">Register a new user in the OS</p>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label text-secondary fw-bold" style="font-size: 0.85rem;">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-user text-muted"></i></span>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary fw-bold" style="font-size: 0.85rem;">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                    <input type="email" id="regEmail" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary fw-bold" style="font-size: 0.85rem;">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" id="regPass" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary fw-bold" style="font-size: 0.85rem;">System Role</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-shield-halved text-muted"></i></span>
                    <select class="form-select" id="regRole" required>
                        <option value="Employee">Employee (View only)</option>
                        <option value="Manager">Manager (Attendance/Leaves)</option>
                        <option value="Boss">Boss (Full Access + Payroll)</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-register text-white">Register Now</button>
            <p class="text-center mt-3 mb-0" style="font-size: 0.9rem;">
                <a href="login.html" class="text-decoration-none text-info">Already have an account? Log In</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Automatically grab today's date so the Dashboard Hiring Chart works instantly
            const todayStr = new Date().toLocaleDateString('en-CA'); 

            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value,
                role: document.getElementById('regRole').value,
                department: "General",       // Default fallback
                designation: "Staff",        // Default fallback
                mobile: "Pending",           // Default fallback
                joinDate: todayStr           // 🔥 THE MAGIC FIX FOR THE CHART!
            };

            try {
                const res = await fetch('http://localhost:8080/employees', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    alert("Account created successfully! You can now log in.");
                    window.location.href = 'login.html';
                } else {
                    alert("Failed to create account. Check your backend.");
                }
            } catch (error) {
                console.error("Registration Error:", error);
                alert("Cannot connect to server. Is Spring Boot running?");
            }
        });
    </script>
</body>
</html>

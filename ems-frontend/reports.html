<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - EmpyreanOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; width: 250px; position: fixed; z-index: 1000; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; border-radius: 0 25px 25px 0; margin-right: 10px; }
        .sidebar a:hover, .sidebar a.active { background-color: #494e53; color: white; }
        .main-content { margin-left: 250px; padding: 20px; width: calc(100% - 250px); }
        
        .report-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; margin-bottom: 25px; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <h4 class="text-center py-4 border-bottom border-secondary" style="font-weight: 800; letter-spacing: 1px; color: white;">Empyrean<span class="text-info">OS</span></h4>
        
        <nav class="mt-2" id="dynamicSidebarMenu"></nav>
        
        <a href="#" onclick="logout()" class="text-danger mt-auto p-3 text-decoration-none fw-bold border-top border-secondary">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Secure Logout
        </a>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 rounded">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Reports & Analytics</span>
                
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm btn-outline-primary me-4" onclick="refreshAllCharts()">
                        <i class="fa-solid fa-rotate me-1"></i> Refresh Data
                    </button>

                    <div class="position-relative me-4" style="cursor: pointer;">
                        <i class="fa-solid fa-bell fs-5 text-secondary"></i>
                    </div>
                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none text-dark">
                            <img src="" id="navAvatar" width="40" height="40" class="rounded-circle me-2">
                            <strong id="navUserName">Loading...</strong>
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="row">
            <div class="col-md-6">
                <div class="report-card">
                    <h5 class="mb-4 text-secondary"><i class="fa-solid fa-clipboard-user me-2"></i>Today's Attendance Split</h5>
                    <div class="chart-container">
                        <canvas id="attendancePieChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="report-card">
                    <h5 class="mb-4 text-secondary"><i class="fa-solid fa-sitemap me-2"></i>Employees by Department</h5>
                    <div class="chart-container">
                        <canvas id="deptBarChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-12" id="payrollChartSection">
                <div class="report-card">
                    <h5 class="mb-4 text-secondary"><i class="fa-solid fa-chart-line me-2"></i>Monthly Payroll Trend</h5>
                    <div class="chart-container" style="height: 350px;">
                        <canvas id="salaryLineChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // --- 1. CRASH-PROOF SECURITY ---
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';

        const role = localStorage.getItem('userRole');
        const currentUserName = localStorage.getItem('currentUserName') || 'User';

        document.addEventListener('DOMContentLoaded', () => {
            // Setup Navbar Profile
            document.getElementById('navUserName').innerText = currentUserName;
            document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUserName)}&background=0D8ABC&color=fff`;

            // --- THE ULTIMATE DYNAMIC SIDEBAR ENGINE ---
            const sidebarMenu = document.getElementById('dynamicSidebarMenu');
            let menuHtml = '';
            let currentPageName = window.location.pathname.split('/').pop() || 'reports.html';

            // 1. MAIN
            menuHtml += `<p class="text-secondary ms-3 mb-1 mt-2" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">MAIN</p>`;
            menuHtml += `<a href="index.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-house fa-fw me-2"></i> Dashboard</a>`;
            menuHtml += `<a href="attendance.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-clock fa-fw me-2"></i> Time & Attendance</a>`;
            menuHtml += `<a href="leaves.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-plane-departure fa-fw me-2"></i> Leave Management</a>`;
            menuHtml += `<a href="calendar.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-calendar-days fa-fw me-2"></i> Calendar</a>`;
            menuHtml += `<a href="chat.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-comments fa-fw me-2"></i> Communications</a>`;
            
            // 2. MY WORKSPACE
            if (role === 'Employee' || role === 'Manager') {
                menuHtml += `<p class="text-secondary ms-3 mb-1 mt-3" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">MY WORKSPACE</p>`;
                menuHtml += `<a href="workspace.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-laptop-code fa-fw me-2"></i> My Workspace</a>`;
            }

            // 3. TEAM MANAGEMENT
            if (role === 'Manager' || role === 'Boss') {
                menuHtml += `<p class="text-secondary ms-3 mb-1 mt-3" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">TEAM MANAGEMENT</p>`;
                menuHtml += `<a href="team.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-users-viewfinder fa-fw me-2"></i> Team Hub</a>`;
                menuHtml += `<a href="reports.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-chart-pie fa-fw me-2"></i> Team Reports</a>`;
            }

            // 4. OPERATIONS & GOD MODE (Boss Only)
            if (role === 'Boss') {
                menuHtml += `<p class="text-secondary ms-3 mb-1 mt-3" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">OPERATIONS</p>`;
                menuHtml += `<a href="employees.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-users-gear fa-fw me-2"></i> Directory & Access</a>`;
                menuHtml += `<a href="payroll.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-money-check-dollar fa-fw me-2"></i> Payroll & Finance</a>`;
                
                menuHtml += `<p class="text-info ms-3 mb-1 mt-3" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;"><i class="fa-solid fa-bolt"></i> GOD MODE</p>`;
                menuHtml += `<a href="godmode.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-server fa-fw me-2"></i> Executive Console</a>`;
            }

            // 5. SYSTEM
            menuHtml += `<p class="text-secondary ms-3 mb-1 mt-3" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">SYSTEM</p>`;
            menuHtml += `<a href="settings.html" class="text-light text-decoration-none p-2 ps-3 d-block"><i class="fa-solid fa-gear fa-fw me-2"></i> Settings</a>`;

            sidebarMenu.innerHTML = menuHtml;

            // Auto-highlight current page
            const activeLink = document.querySelector(`#dynamicSidebarMenu a[href="${currentPageName}"]`);
            if (activeLink) activeLink.style.backgroundColor = '#494e53';

            // Route Security 
            if (role === 'Employee') {
                window.location.href = 'index.html'; // Employees shouldn't see reports at all
            } else if (role === 'Manager') {
                // 🔥 HIDE THE PAYROLL CHART SECTION COMPLETELY FOR MANAGERS
                document.getElementById('payrollChartSection').style.display = 'none';
            }
            
            refreshAllCharts(); 
        });

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // --- 2. REPORT CHARTS LOGIC ---
        let attChart = null;
        let deptChart = null;
        let salChart = null;

        function refreshAllCharts() {
            initAttendanceChart();
            initDepartmentChart();
            
            // Only spend computer memory building the salary chart if they are the Boss
            if(localStorage.getItem('userRole') === 'Boss') {
                initSalaryChart();
            }
        }

        // ATTENDANCE PIE CHART
        async function initAttendanceChart() {
            const today = new Date().toLocaleDateString('en-CA');
            try {
                const res = await fetch(`http://localhost:8080/attendance/date/${today}`);
                const data = await res.json();

                let present = 0, absent = 0, late = 0;
                data.forEach(r => {
                    if (r.status === 'Present') present++;
                    else if (r.status === 'Absent') absent++;
                    else if (r.status === 'Late') late++;
                });

                if (attChart) attChart.destroy();
                const ctx = document.getElementById('attendancePieChart').getContext('2d');
                attChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Present', 'Absent', 'Late'],
                        datasets: [{
                            data: [present, absent, late],
                            backgroundColor: ['#198754', '#dc3545', '#ffc107'],
                            borderWidth: 0
                        }]
                    },
                    options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                });
            } catch (e) { console.error(e); }
        }

        // DEPARTMENT BAR CHART
        async function initDepartmentChart() {
            try {
                const res = await fetch('http://localhost:8080/employees');
                const emps = await res.json();

                const deptCounts = {};
                emps.forEach(e => {
                    if(e.role !== 'Boss') {
                        deptCounts[e.department] = (deptCounts[e.department] || 0) + 1;
                    }
                });

                if (deptChart) deptChart.destroy();
                const ctx = document.getElementById('deptBarChart').getContext('2d');
                deptChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(deptCounts),
                        datasets: [{
                            label: 'Employees',
                            data: Object.values(deptCounts),
                            backgroundColor: '#0d6efd',
                            borderRadius: 5
                        }]
                    },
                    options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
                });
            } catch (e) { console.error(e); }
        }

        // SALARY LINE CHART (ONLY BUILDS FOR BOSS)
        async function initSalaryChart() {
            try {
                const res = await fetch('http://localhost:8080/payroll');
                const records = await res.json();

                const monthlyData = {};
                records.forEach(r => {
                    monthlyData[r.salaryMonth] = (monthlyData[r.salaryMonth] || 0) + r.netSalary;
                });

                const sortedMonths = Object.keys(monthlyData).sort();

                if (salChart) salChart.destroy();
                const ctx = document.getElementById('salaryLineChart').getContext('2d');
                salChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sortedMonths,
                        datasets: [{
                            label: 'Total Payout ($)',
                            data: sortedMonths.map(m => monthlyData[m]),
                            borderColor: '#6f42c1',
                            backgroundColor: 'rgba(111, 66, 193, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { maintainAspectRatio: false }
                });
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>

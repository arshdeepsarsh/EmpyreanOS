<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmpyreanHR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .btn-login { background: #764ba2; border: none; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-login:hover { background: #5a397a; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-shield fa-3x text-primary mb-3"></i>
            <h2>EmpyreanHR</h2>
            <p class="text-muted">Enter your credentials to access the OS</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                    <input type="email" id="loginEmail" class="form-control" placeholder="admin@company.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">Log In</button>
        </form>
        <div id="loginError" class="alert alert-danger mt-3 d-none">Invalid email or password. Please try again.</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch('http://localhost:8080/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                if (response.ok) {
                    const user = await response.json();
                    
                    // SAVE EVERYTHING TO MEMORY!
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', user.email);
                    localStorage.setItem('userRole', user.role); 
                    localStorage.setItem('currentUserId', user.id); 
                    localStorage.setItem('currentUserName', user.name); 
                    
                    window.location.href = 'index.html';
                } else {
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("Backend is not running.");
            }
        });
    </script>
</body>
</html>
